name: Update signals

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  push:
    branches: [main]
    paths-ignore:
      - "signals.json"      # don't re-run just because signals changed
  workflow_dispatch:         # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: signals
  cancel-in-progress: false

jobs:
  signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build signals.json
        env:
          # PAT with read access to the private product repos (trip-planner, home-dashboard,
          # apple-grove). Falls back to the default token for public repos only.
          SIGNALS_TOKEN: ${{ secrets.SIGNALS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/build-signals.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- signals.json; then
            echo "No changes to signals.json"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add signals.json
            git commit -m "chore: update signals"
            git push
          fi
